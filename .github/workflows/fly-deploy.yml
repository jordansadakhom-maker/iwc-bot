name: Deploy to Fly.io

# Construit l'image et déploie le bot sur Fly.io.
# - automatiquement à chaque push sur main
# - ou manuellement (onglet Actions → Run workflow)
#
# Nécessite un secret de dépôt : FLY_API_TOKEN
#   (GitHub → Settings → Secrets and variables → Actions → New repository secret)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'web/**'          # les changements du site (Vercel) ne redéploient pas le bot
  workflow_dispatch:

jobs:
  deploy:
    name: Déployer sur Fly
    runs-on: ubuntu-latest
    concurrency: deploy-group   # évite deux déploiements en parallèle
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
